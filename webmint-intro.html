<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebMint Intro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@800&family=Poppins:wght@300&display=swap" rel="stylesheet">
<style>

@font-face {
  font-family: 'Ahsing';
  src: url('assets/ahsing-font/typogama-ahsing.otf') format('opentype');
  font-weight: bold;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  background: #12141d;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}

#stage {
  position:relative;
  width:100vw; height:100vh;
  display:flex; align-items:center; justify-content:center;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   LOGO LETTERS — no box, pure letter + bevel
   Ahsing "M" rotated:
     W-side → rotate(90deg)  → blue
     M-side → rotate(-90deg) → green
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.lmark {
  font-family: 'Ahsing', 'League Spartan', sans-serif;
  font-weight: bold;
  font-size: 72px;   /* ≥ WebMint text visual cap height */
  line-height: 1;
  display: inline-block;
  user-select: none;
}

/* Blue W — bevel: bright top-left, dark bottom-right */
.lmark.w {
  color: #1868f0;
  transform: rotate(90deg);
  filter:
    drop-shadow(0px -2px 0px rgba(160,205,255,0.90))
    drop-shadow(-2px 0px 0px rgba(180,215,255,0.55))
    drop-shadow(0px  2px 0px rgba(4,22,75,0.95))
    drop-shadow(0px  4px 0px rgba(3,14,55,0.80))
    drop-shadow(0px  6px 0px rgba(2,8,35,0.60))
    drop-shadow(0px  8px 8px rgba(0,0,0,0.55))
    drop-shadow(2px  0px 0px rgba(4,22,75,0.50));
}

/* Green M — bevel: bright top-left, dark bottom-right */
.lmark.m {
  color: #118866;
  transform: rotate(-90deg);
  filter:
    drop-shadow(0px -2px 0px rgba(100,230,170,0.90))
    drop-shadow(-2px 0px 0px rgba(120,240,185,0.55))
    drop-shadow(0px  2px 0px rgba(3,30,20,0.95))
    drop-shadow(0px  4px 0px rgba(2,20,14,0.80))
    drop-shadow(0px  6px 0px rgba(1,12,8,0.60))
    drop-shadow(0px  8px 8px rgba(0,0,0,0.55))
    drop-shadow(2px  0px 0px rgba(3,30,20,0.50));
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   BALLS — 3D gloss spheres
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.dot {
  width: 16px; height: 16px;
  border-radius: 50%;
  display: block;
  flex-shrink: 0;
}
.dot.dg {
  background: radial-gradient(circle at 33% 28%,
    #ccffe6 0%, #52dda0 26%, #20b872 52%, #118866 76%, #03291a 100%);
  box-shadow:
    0 3px 12px rgba(17,136,102,0.75),
    inset 0 -2px 4px rgba(0,0,0,0.35),
    inset 0 2px 5px rgba(255,255,255,0.65);
}
.dot.db {
  background: radial-gradient(circle at 33% 28%,
    #d8edff 0%, #78afff 26%, #3575ff 52%, #1868f0 76%, #03104a 100%);
  box-shadow:
    0 3px 12px rgba(24,104,240,0.75),
    inset 0 -2px 4px rgba(0,0,0,0.35),
    inset 0 2px 5px rgba(255,255,255,0.65);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ANIMATING MARK — center stage during ball cycles
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#AM {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  /* gap handled by JS-positioned balls */
}

/* Ball container — zero-width so balls offset from true center */
#AB {
  position: relative;
  width: 0; height: 18px;
  margin-bottom: 6px;
}

#ballG, #ballB {
  position: absolute;
  top: 0;
  left: 50%;
}

/* Letters row in anim mark */
#AL {
  display: flex;
  align-items: center;
  gap: 0px;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   FINAL LOGO BLOCK — revealed at end
   Layout:
     [W M]  WebMint      ← same baseline
     CODE CLARITY CONVERSION  ← full width below
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#FB {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  opacity: 0;
}

#FR {   /* top row: mark + wordmark */
  display: flex;
  align-items: flex-end;
  gap: 28px;
}

/* Final mark: balls on top, letters below */
#FM {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
#FBalls {
  display: flex;
  align-items: center;
  gap: 12px;
}
#FLetters {
  display: flex;
  align-items: center;
  gap: 0px;
}

#FBalls {
  display: none;
}

#AL .lmark.w  { margin-right: -14px; }
#FLetters .lmark.w { margin-right: -14px; }

/* WebMint wordmark */
#WM {
  font-family: 'League Spartan', sans-serif;
  font-weight: 800;
  font-size: 68px;       /* matches 72px Ahsing visual cap height */
  letter-spacing: 1px;
  /* margin-left: 25px; */
  color: #f8f9fb;
  /* Clean subtle bevel — NOT over-shadowed */
  filter:
    drop-shadow(0px  1px 0px rgba(255,255,255,0.18))
    drop-shadow(0px  3px 3px rgba(0,0,0,0.38))
    drop-shadow(0px  6px 10px rgba(0,0,0,0.18));
  opacity: 0;
  transform: translateY(18px);
}

/* Slogan */
#SL {
  font-family: 'Poppins', sans-serif;
  font-weight: 300;
  font-size: 10.5px;
  letter-spacing: 7px;
  /* #f8f9fb @ 42% transparency on dark bg */
  color: rgba(248,249,251,0.42);
  text-transform: uppercase;
  white-space: normal;
  overflow: visible;
  text-align: justify;
  text-align-last: justify;
  margin-top: 11px;
  opacity: 0;
  transform: translateY(10px);
}

/* Replay */
#RB {
  position: fixed; bottom:22px; right:22px;
  background: rgba(248,249,251,0.05);
  border: 1px solid rgba(248,249,251,0.12);
  color: rgba(248,249,251,0.38);
  padding: 7px 18px; border-radius: 20px;
  font-family: 'League Spartan', sans-serif;
  font-size: 11px; letter-spacing: 2px;
  cursor: pointer; opacity: 0;
  transition: opacity .35s, background .2s, color .2s;
}
#RB:hover { background:rgba(248,249,251,0.11); color:#f8f9fb; }

@media (max-width: 768px) {
  .lmark { font-size: 48px; }
  .dot   { width: 13px; height: 13px; }
  #WM    { font-size: 44px; margin-left: 18px; }
  #FR    { gap: 12px; }
  #SL    { font-size: 8.5px; letter-spacing: 3px !important; }
  #AL .lmark.w, #FLetters .lmark.w { margin-right: -10px; }
  #FLetters{
    gap: 2px;
  }
}

@media (max-width: 480px) {
  .lmark { font-size: 36px; }
  .dot   { width: 10px; height: 10px; }
  #WM    { font-size: 33px; margin-left: 12px; }
  #FR    { gap: 8px; }
  #SL    { font-size: 6.5px; letter-spacing: 2px !important; }
  #AL .lmark.w, #FLetters .lmark.w { margin-right: -8px; }

  #FLetters{
    gap: 3px;
  }
}

@media (max-width: 360px) {
  .lmark { font-size: 28px; }
  .dot   { width: 8px; height: 8px; }
  #WM    { font-size: 26px; margin-left: 8px; }
  #FR    { gap: 4px; }
  #SL    { font-size: 5.5px; letter-spacing: 1.5px !important;}
  #AL .lmark.w, #FLetters .lmark.w { margin-right: -6px; }

  #FLetters{
    gap: 4px;
  }
}



</style>
</head>
<body>
<div id="stage">

  <!-- ANIMATING CENTER MARK -->
  <div id="AM">
    <div id="AB">
      <div class="dot dg" id="ballG"></div>
      <div class="dot db" id="ballB"></div>
    </div>
    <div id="AL">
      <span class="lmark w" id="AW">M</span>
      <span class="lmark m" id="AM2">M</span>
    </div>
  </div>

  <!-- FINAL FULL LOGO BLOCK -->
  <div id="FB">
    <div id="FR">
      <div id="FM">
        <div id="FBalls">
          <div class="dot dg"></div>
          <div class="dot db"></div>
        </div>
        <div id="FLetters">
          <span class="lmark w">M</span>
          <span class="lmark m">M</span>
        </div>
      </div>
      <div id="WM">WebMint</div>
    </div>
    <div id="SL">CODE &nbsp;&nbsp; CLARITY &nbsp;&nbsp; CONVERSION</div>
  </div>

</div>
<button id="RB">↺ REPLAY</button>

<script>
'use strict';

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   EASING LIBRARY
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const lerp  = (a,b,t) => a + (b-a)*t;
const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));

/* Make ball offsets responsive based on actual letter width */
function getGX() { return -(AW.offsetWidth * 0.55); }
function getBX() { return  (AW.offsetWidth * 0.55); }
function getYAIR() { return -(AW.offsetHeight * 1.4); }

function easeOutCubic(t)   { return 1-Math.pow(1-t,3); }
function easeOutQuart(t)   { return 1-Math.pow(1-t,4); }
function easeOutQuint(t)   { return 1-Math.pow(1-t,5); }
function easeInOutCubic(t) { return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }
function easeInOutQuart(t) { return t<.5?8*t*t*t*t:1-Math.pow(-2*t+2,4)/2; }

function easeOutBack(t) {
  const c=1.70158, c3=c+1;
  return 1 + c3*Math.pow(t-1,3) + c*Math.pow(t-1,2);
}

function easeOutElastic(t) {
  if(t===0||t===1) return t;
  return Math.pow(2,-10*t)*Math.sin((t*10-0.75)*(2*Math.PI/3))+1;
}

/* Multi-bounce: real ball bouncing physics */
function easeOutBounce(t) {
  const n=7.5625, d=2.75;
  if(t<1/d)     return n*t*t;
  if(t<2/d)     return n*(t-=1.5/d)*t+0.75;
  if(t<2.5/d)   return n*(t-=2.25/d)*t+0.9375;
  return          n*(t-=2.625/d)*t+0.984375;
}

/* Spring: damped cosine oscillation — gives overshoot+settle */
function easeSpring(t, stiffness=14, damping=5) {
  return 1 - Math.exp(-damping*t) * Math.cos(stiffness*t);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TWEEN ENGINE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function tw(ms, onUpdate, easeFn) {
  easeFn = easeFn || easeOutCubic;
  return new Promise(resolve => {
    const start = performance.now();
    function tick(now) {
      const raw = clamp((now-start)/ms, 0, 1);
      onUpdate(easeFn(raw), raw);
      if(raw < 1) requestAnimationFrame(tick);
      else { onUpdate(1,1); resolve(); }
    }
    requestAnimationFrame(tick);
  });
}
const wait = ms => new Promise(r => setTimeout(r,ms));

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ELEMENTS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const AM   = document.getElementById('AM');    /* anim mark wrapper */
const ballG = document.getElementById('ballG');
const ballB = document.getElementById('ballB');
const AW   = document.getElementById('AW');    /* anim W letter */
const AM2  = document.getElementById('AM2');   /* anim M letter */
const FB   = document.getElementById('FB');    /* final block */
const WM   = document.getElementById('WM');    /* WebMint text */
const SL   = document.getElementById('SL');    /* slogan */
const RB   = document.getElementById('RB');    /* replay btn */

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   BALL PHYSICS CONSTANTS

   Balls hover above letters.
   Each letter is ~72px font = ~54px wide rendered.
   Gap between letters = 8px.
   So letter centers are at:
     W center: -(54/2 + 8/2) = -31px from mark center
     M center: +(54/2 + 8/2) = +31px from mark center

   Ball y=0 → sitting on top of letters
   Ball y=-80 → in the air above
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const Y0 =    0;   /* y when resting on letters */
let GX   = -31;
let BX   =  31;
let YAIR = -82;

/* Current letter rotations — tracked globally */
let wRot = 90;   /* W letter: M rotated 90° = looks like W */
let mRot = -90;  /* M letter: M rotated -90° = looks like mirrored W */

/* Current squish scale for letters on ball impact */
let wSq = 1, mSq = 1;

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SETTERS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function posGreen(x, y) {
  ballG.style.transform = `translate(calc(-50% + ${x}px), ${y}px)`;
}
function posBlue(x, y) {
  ballB.style.transform = `translate(calc(-50% + ${x}px), ${y}px)`;
}
function posBalls(gx,gy, bx,by) {
  posGreen(gx,gy);
  posBlue(bx,by);
}

function rotLetters(wd, md) {
  AW.style.transform  = `rotate(${wd}deg) scaleX(${wSq})`;
  AM2.style.transform = `rotate(${md}deg) scaleX(${mSq})`;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PRIMITIVE ANIMATIONS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

/* Drop both balls from air → land on their letters
   with satisfying bounce + letter squish on impact */
function dropBalls(ms) {
  return tw(ms, (e,raw) => {
    /* Y: fall with multi-bounce */
    const gy = lerp(YAIR, Y0, easeOutBounce(raw));
    const by = gy;

    /* X: cross direction — balls start slightly inward, spread to home */
    const gx = lerp(GX * 0.45, GX, easeOutCubic(raw));
    const bx = lerp(BX * 0.45, BX, easeOutCubic(raw));

    posBalls(gx, gy, bx, by);

    /* Letter squish: compress on impact (last 12%) then recover */
    if(raw > 0.82) {
      const impact = (raw - 0.82) / 0.18;
      /* compress → snap back */
      const sq = impact < 0.5
        ? lerp(1.0, 0.85, impact / 0.5)      /* compress */
        : lerp(0.85, 1.0, (impact-0.5)/0.5); /* recover */
      wSq = sq; mSq = sq;
      rotLetters(wRot, mRot);
    } else {
      wSq = 1; mSq = 1;
    }
  }, raw => raw);
}

/* Launch both balls from letters → spring up to air */
function launchBalls(ms) {
  return tw(ms, (e, raw) => {
    /* Spring physics: overshoot then settle */
    const sy  = easeSpring(raw, 13, 5);
    const gy  = lerp(Y0, YAIR, sy);

    /* Slight natural spread as they rise (like a real bounce) */
    const spr = Math.sin(raw * Math.PI) * 5;
    const gx  = GX - spr * 0.25;
    const bx  = BX + spr * 0.25;

    posBalls(gx, gy, bx, gy);

    /* Unsquish letters as balls leave */
    if(raw < 0.18) {
      wSq = lerp(0.85, 1.0, raw/0.18);
      mSq = wSq;
      rotLetters(wRot, mRot);
    }
  }, raw => raw);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ROTATION CYCLE
   Pattern per your spec:
     Phase A (rotMs): letters rotate + balls fall simultaneously
     Phase B (restMs): balls rest on letters (tiny pause)
     Phase C (jumpMs): balls spring back up
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function cycle(wFrom,wTo, mFrom,mTo, rotMs, restMs, jumpMs) {

  /* Phase A — rotate letters while balls fall */
  await tw(rotMs, (e, raw) => {
    /* Smooth rotation */
    const rt = easeInOutCubic(raw);
    wRot = lerp(wFrom, wTo, rt);
    mRot = lerp(mFrom, mTo, rt);
    rotLetters(wRot, mRot);

    /* Simultaneous ball fall — cross direction */
    const gy  = lerp(YAIR, Y0, easeOutBounce(raw));
    const gx  = lerp(GX * 0.45, GX, easeOutCubic(raw));
    const bx  = lerp(BX * 0.45, BX, easeOutCubic(raw));
    posBalls(gx, gy, bx, gy);

    /* Impact squish last 14% */
    if(raw > 0.82) {
      const imp = (raw-0.82)/0.18;
      const sq  = imp < 0.5 ? lerp(1,0.84,imp/0.5) : lerp(0.84,1,(imp-0.5)/0.5);
      wSq = sq; mSq = sq;
      rotLetters(wRot, mRot);
    } else { wSq=1; mSq=1; }

  }, raw => raw);

  wRot = wTo; mRot = mTo;
  wSq=1; mSq=1;
  rotLetters(wRot, mRot);
  posBalls(GX, Y0, BX, Y0);

  /* Phase B — rest */
  await wait(restMs);

  /* Phase C — spring launch */
  await launchBalls(jumpMs);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MAIN ANIMATION  (~12 seconds total)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function run() {

   GX = getGX();   /* ← add these two lines at very top of run() */
   BX = getBX();
   YAIR = getYAIR();

   // Signal parent page that animation is complete

  /* ── FULL RESET ── */
  AM.style.cssText    = 'position:absolute;display:flex;flex-direction:column;align-items:center;opacity:1;transform:translate(0,0) scale(1)';
  FB.style.opacity    = '0';
  FB.style.transform  = '';
  WM.style.opacity    = '0';
  WM.style.transform  = 'translateY(18px)';
  SL.style.opacity    = '0';
  SL.style.transform  = 'translateY(10px)';
  SL.style.letterSpacing = '0px';
  RB.style.opacity    = '0';

  wRot=90; mRot=-90; wSq=1; mSq=1;
  rotLetters(wRot, mRot);

  /* Balls start merged at center top (will spread + drop) */
  posBalls(0, YAIR - 24, 0, YAIR - 24);

  /* ══════════════════════════════════════
     0.00 – 0.42s
     Intro: balls appear from top center,
     spread apart and drop onto letters
  ══════════════════════════════════════ */
  await tw(420, (e, raw) => {
    const gx = lerp(0, GX, easeOutBack(raw));
    const bx = lerp(0, BX, easeOutBack(raw));
    const gy = lerp(YAIR-24, Y0, easeOutBounce(raw));
    posBalls(gx, gy, bx, gy);
    /* Impact squish */
    if(raw > 0.80) {
      const imp = (raw-0.80)/0.20;
      const sq  = imp < 0.5 ? lerp(1,0.85,imp/0.5) : lerp(0.85,1,(imp-0.5)/0.5);
      wSq=sq; mSq=sq; rotLetters(wRot,mRot);
    }
  }, raw => raw);

  wSq=1; mSq=1; rotLetters(wRot,mRot);
  posBalls(GX, Y0, BX, Y0);
  await wait(55);

  /* ══════════════════════════════════════
     CYCLE 1: 0.26 – 1.15s
     W: 90→180,  M: -90→-180
  ══════════════════════════════════════ */
  await launchBalls(280);
  await cycle(90, 180, -90, -180, 310, 55, 280);

  /* ══════════════════════════════════════
     CYCLE 2: 1.16 – 2.05s
     W: 180→270, M: -180→-270
  ══════════════════════════════════════ */
  await cycle(180, 270, -180, -270, 310, 55, 280);

  /* ══════════════════════════════════════
     CYCLE 3: 2.06 – 2.55s
     W: 270→360, M: -270→-360
  ══════════════════════════════════════ */
  await cycle(270, 360, -270, -360, 310, 55, 280);

  /* ══════════════════════════════════════
     CYCLE 4: 2.56 – 3.45s
     W: 360→450, M: -360→-450
  ══════════════════════════════════════ */
  await cycle(360, 450, -360, -450, 310, 55, 280);

  /* Land balls for final time */
  await dropBalls(400);
  posBalls(GX, Y0, BX, Y0);
  wSq=1; mSq=1; rotLetters(wRot,mRot);
  await wait(80);

  /* ══════════════════════════════════════
     3.46 – 4.10s
     Whole mark jumps up — big spring arc
  ══════════════════════════════════════ */
  await tw(680, (e, raw) => {
    const arc = Math.sin(raw * Math.PI);
    const y   = -arc * 52;
    const sc  = 1 + arc * 0.06;
    AM.style.transform = `translateY(${y}px) scale(${sc})`;
  }, raw => raw);

  /* ══════════════════════════════════════
     4.11 – 4.35s
     Drop back with real multi-bounce
  ══════════════════════════════════════ */
  await tw(300, (e, raw) => {
    AM.style.transform = `translateY(${lerp(-52,0,easeOutBounce(raw))}px)`;
  }, raw => raw);

  /* ══════════════════════════════════════
     4.36 – 4.50s
     Micro secondary bounce settle
  ══════════════════════════════════════ */
  await tw(220, (e, raw) => {
    const y = -Math.abs(Math.sin(raw * Math.PI * 2.2)) * 11 * (1-raw);
    AM.style.transform = `translateY(${y}px)`;
  }, raw => raw);
  AM.style.transform = 'translate(0,0)';

  /* ══════════════════════════════════════
     4.46 – 5.10s
     Mark slides LEFT to final position
     while letters do one full 360° spin
  ══════════════════════════════════════ */

  /* Measure final layout to get exact slide distance */
  FB.style.opacity = '0.001'; /* temporarily reveal to measure */
  await wait(16);             /* one frame for layout */
  const FR  = document.getElementById('FR');
  const FM  = document.getElementById('FM');
  const frW = FR.getBoundingClientRect().width;
  const fmW = FM.getBoundingClientRect().width;
  /* center of mark in final = -frW/2 + fmW/2 */
  const slideX = -(frW/2 - fmW/2);
  FB.style.opacity = '0';

  /* Hide balls during rotation slide */
ballG.style.opacity = '0';
ballB.style.opacity = '0';

  await tw(740, (e, raw) => {
    const cx = lerp(0, slideX, easeInOutCubic(raw));
    AM.style.transform = `translateX(${cx}px)`;
    /* Smooth 360° spin during slide */
    const wd = lerp(90,  90+360, raw);
    const md = lerp(-90, -90-360, raw);
    wRot=wd; mRot=md;
    rotLetters(wd, md);
  }, raw => raw);

  /* ══════════════════════════════════════
     5.10 – 5.30s
     Cross-fade: animMark → finalBlock
  ══════════════════════════════════════ */
  await tw(280, (e, raw) => {
    AM.style.opacity = String(1-raw);
    FB.style.opacity = String(easeOutCubic(raw));
  }, raw => raw);
  AM.style.display = 'none';

  /* ══════════════════════════════════════
     5.15s  WebMint springs up + fades in
  ══════════════════════════════════════ */
  await tw(680, (e, raw) => {
    WM.style.opacity   = String(easeOutCubic(raw));
    WM.style.transform = `translateY(${lerp(18,0,easeOutBack(raw))}px)`;
  }, raw => raw);

  /* ══════════════════════════════════════
     5.21s  Slogan: elastic letter-spacing
     expand from 0 → 7px, fade + rise
  ══════════════════════════════════════ */
  await wait(55);

  // /* Fit slogan width = topRow width */
  // const rowW = FR.getBoundingClientRect().width;
  // SL.style.width    = rowW + 'px';
  // SL.style.maxWidth = rowW + 'px';

  /* Fit slogan width = topRow width */
const rowW = FR.getBoundingClientRect().width;
const maxW = window.innerWidth * 0.88;          /* ← add this */
SL.style.width    = Math.min(rowW, maxW) + 'px'; /* ← change this */
SL.style.maxWidth = Math.min(rowW, maxW) + 'px'; /* ← change this */

  await tw(900, (e, raw) => {
    /* Letter-spacing springs open with elastic overshoot */
    const ls = lerp(0, 7, easeOutElastic(raw));
    SL.style.letterSpacing = `${ls}px`;
    SL.style.opacity       = String(easeOutCubic(Math.min(raw * 1.6, 1)));
    SL.style.transform     = `translateY(${lerp(10,0,easeOutBack(raw))}px)`;
  }, raw => raw);

  await wait(450);
  RB.style.opacity = '1';
  try { window.parent.postMessage('webmint-intro-done', '*'); } catch(e) {}
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   START
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
document.fonts.ready.then(() => run());

RB.addEventListener('click', () => {
  RB.style.opacity    = '0';
  AM.style.display    = '';
  AM.style.opacity    = '1';
   ballG.style.opacity = '1';   // ← ADD THIS
  ballB.style.opacity = '1'; 
  FB.style.opacity    = '0';
  WM.style.opacity    = '0';
  WM.style.transform  = 'translateY(18px)';
  SL.style.opacity    = '0';
  SL.style.letterSpacing = '0px';
  SL.style.transform  = 'translateY(10px)';
  run();
});
</script>
